<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - Task Intelligence System</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">TI</div>
        <div class="sidebar-brand">
          Task Intelligence
          <span>نظام إدارة المهام</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">القائمة</div>
          <a class="nav-item active" href="index.html">
            <span class="nav-icon">📊</span> لوحة التحكم
          </a>
          <a class="nav-item" href="tasks.html">
            <span class="nav-icon">📋</span> المهام
          </a>
          <a class="nav-item" href="analytics.html">
            <span class="nav-icon">📈</span> التحليلات
          </a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="nav-item" onclick="handleLogout()">
          <span class="nav-icon">🚪</span> تسجيل الخروج
        </div>
      </div>
    </aside>

    <!-- Sidebar Overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
          <h1 class="page-title">لوحة التحكم</h1>
        </div>
        <div class="topbar-right">
          <span class="topbar-date" id="currentDate"></span>
          <div class="user-avatar" id="userAvatar" onclick="toggleUserDropdown()">
            <span id="avatarLetter">U</span>
            <div class="user-dropdown" id="userDropdown">
              <div class="user-dropdown-item" id="userEmail" style="color:var(--text-muted);cursor:default;"></div>
              <div class="user-dropdown-item danger" onclick="handleLogout()">🚪 تسجيل الخروج</div>
            </div>
          </div>
        </div>
      </header>

      <!-- Page Content -->
      <div class="page-content">
        <!-- Stats Cards -->
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <div class="stat-icon success">✓</div>
            <div class="stat-info">
              <div class="stat-value" id="completedCount">0</div>
              <div class="stat-label">المهام المكتملة اليوم</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon warning">⏳</div>
            <div class="stat-info">
              <div class="stat-value" id="pendingCount">0</div>
              <div class="stat-label">المهام المتبقية</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon primary">📊</div>
            <div class="stat-info">
              <div class="stat-value" id="completionRate">0%</div>
              <div class="stat-label">نسبة الإنجاز اليومي</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:var(--warning-light);color:var(--warning);">⭐</div>
            <div class="stat-info">
              <div class="stat-value" id="productivityScore">0</div>
              <div class="stat-label">درجة الإنتاجية</div>
            </div>
          </div>
        </div>

        <!-- Row -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
          <!-- Circular Progress -->
          <div class="card" style="grid-column:span 2;">
            <div class="card-header">
              <h3 class="card-title">ملخص اليوم</h3>
            </div>
            <div style="display:flex;align-items:center;gap:32px;flex-wrap:wrap;justify-content:center;">
              <div class="circular-progress" id="circularProgress">
                <svg width="120" height="120">
                  <circle class="bg-circle" cx="60" cy="60" r="48"></circle>
                  <circle class="progress-circle" cx="60" cy="60" r="48" stroke-dasharray="301.6" stroke-dashoffset="301.6"></circle>
                </svg>
                <div class="center-text">
                  <div class="center-value" id="circlePercent">0%</div>
                  <div class="center-label">إنجاز</div>
                </div>
              </div>
              <div style="flex:1;min-width:200px;">
                <div id="todaySummary" class="summary-list">
                  <div class="summary-item">
                    <div class="summary-dot" style="background:var(--success);"></div>
                    <span class="summary-text">مكتمل: <strong id="summaryCompleted">0</strong></span>
                  </div>
                  <div class="summary-item">
                    <div class="summary-dot" style="background:var(--warning);"></div>
                    <span class="summary-text">متبقي: <strong id="summaryPending">0</strong></span>
                  </div>
                  <div class="summary-item">
                    <div class="summary-dot" style="background:var(--primary);"></div>
                    <span class="summary-text">إجمالي المهام: <strong id="summaryTotal">0</strong></span>
                  </div>
                  <div class="summary-item">
                    <div style="width:100%;margin-top:8px;">
                      <div class="progress-bar-wrapper">
                        <div class="progress-bar-fill" id="summaryBar" style="width:0%;"></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Upcoming Tasks -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">المهام القادمة</h3>
          </div>
          <div id="upcomingTasks">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="supabase.js"></script>
  <script src="app.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
