<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التحديات - THE SYSTEM</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/challenges.css">
  <link rel="stylesheet" href="css/system.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <div class="topbar-logo">S</div>
          <h1 class="page-title">🏆 التحديات</h1>
        </div>
        <div class="topbar-right">
          <span class="topbar-date" id="currentDate"></span>
          <div class="user-avatar" onclick="toggleDropdown(event)">
            <span id="avatarLetter">U</span>
            <div class="user-dropdown" id="userDropdown">
              <div class="user-dropdown-item" id="userEmail" style="color:var(--text-muted);cursor:default;"></div>
              <div class="user-dropdown-item danger" onclick="handleLogout()">🚪 تسجيل الخروج</div>
            </div>
          </div>
        </div>
      </header>

      <div class="page-content">
        <!-- Hero Challenge -->
        <div id="challengeHero" class="challenge-hero" style="display:none;">
          <div class="challenge-hero-content">
            <div class="challenge-hero-badge" id="heroBadge">🔥 فعال الآن</div>
            <h2 class="challenge-hero-title" id="heroTitle"></h2>
            <p class="challenge-hero-desc" id="heroDesc"></p>
            <div class="challenge-hero-meta">
              <div class="challenge-hero-meta-item">👥 <strong id="heroParticipants">0</strong> مشارك</div>
              <div class="challenge-hero-meta-item">📅 <strong id="heroEnd">--</strong></div>
              <div class="challenge-hero-meta-item">🏅 <strong id="heroWinners">0</strong> فائز</div>
              <div class="challenge-hero-meta-item">🪑 المقاعد المتبقية: <strong id="heroSeats">∞</strong></div>
            </div>
            <div style="display:flex;gap:12px;flex-wrap:wrap;">
              <button class="btn btn-primary btn-lg" id="heroJoinBtn" onclick="heroJoinChallenge()">انضم الآن</button>
              <button class="btn btn-outline btn-lg" onclick="scrollToChallenges()">تصفح التحديات</button>
            </div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
          <button class="tab active" onclick="switchChallengeTab('active', this)">نشطة</button>
          <button class="tab" onclick="switchChallengeTab('upcoming', this)">قادمة</button>
          <button class="tab" onclick="switchChallengeTab('completed', this)">منتهية</button>
        </div>

        <!-- Challenge Grid -->
        <div id="challengesContainer">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Challenge Detail Modal -->
  <div class="modal-overlay" id="challengeDetailModal">
    <div class="modal" style="max-width:680px;">
      <div class="modal-header">
        <h3 class="modal-title" id="detailTitle">تفاصيل التحدي</h3>
        <button class="modal-close" onclick="closeModal('challengeDetailModal')">&times;</button>
      </div>
      <div class="modal-body" id="detailBody" style="max-height:70vh;overflow-y:auto;">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- Verification Modal -->
  <div class="modal-overlay" id="verificationModal">
    <div class="modal" style="max-width:520px;">
      <div class="modal-header">
        <h3 class="modal-title">إرسال إثبات الإنجاز</h3>
        <button class="modal-close" onclick="closeModal('verificationModal')">&times;</button>
      </div>
      <form id="verificationForm" onsubmit="return submitVerification(event)">
        <div class="modal-body">
          <input type="hidden" id="verifyChallengeId">
          <div class="form-group">
            <label class="form-label">اسم المستخدم في Telegram</label>
            <input class="form-input" type="text" id="verifyTelegram" placeholder="@username" required>
          </div>
          <div class="form-group">
            <label class="form-label">البريد الإلكتروني في Google</label>
            <input class="form-input" type="email" id="verifyEmail" placeholder="example@gmail.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">التحدي</label>
            <input class="form-input" type="text" id="verifyChallengeName" readonly>
          </div>
          <div class="form-group">
            <label class="form-label">رقم اليوم</label>
            <input class="form-input" type="number" id="verifyDay" min="1" value="1" required>
          </div>
          <div class="form-group">
            <label class="form-label">وصف الإنجاز</label>
            <textarea class="form-textarea" id="verifyDesc" placeholder="ما الذي أنجزته اليوم؟" required></textarea>
          </div>
          <div class="form-group" style="background:var(--bg-primary);padding:12px;border-radius:var(--border-radius-sm);">
            <p style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:8px;">📱 سيتم إنشاء رسالة وإرسالها عبر Telegram:</p>
            <div id="telegramPreview" style="font-size:0.8rem;color:var(--text-muted);direction:ltr;text-align:left;font-family:monospace;white-space:pre-wrap;"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal('verificationModal')">إلغاء</button>
          <button type="submit" class="btn btn-primary" id="verifySubmitBtn">فتح Telegram</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="index.html" class="bottom-nav-item" data-page="index"><span class="bnav-icon">📊</span><span class="bnav-label">الرئيسية</span></a>
      <a href="system.html" class="bottom-nav-item" data-page="system"><span class="bnav-icon">⚡</span><span class="bnav-label">النظام</span></a>
      <a href="tasks.html" class="bottom-nav-item" data-page="tasks"><span class="bnav-icon">📋</span><span class="bnav-label">المهام</span></a>
      <a href="challenges.html" class="bottom-nav-item" data-page="challenges"><span class="bnav-icon">🏆</span><span class="bnav-label">التحديات</span></a>
      <a href="analytics.html" class="bottom-nav-item" data-page="analytics"><span class="bnav-icon">📈</span><span class="bnav-label">التحليلات</span></a>
      <a href="profile.html" class="bottom-nav-item" data-page="profile"><span class="bnav-icon">👤</span><span class="bnav-label">الملف</span></a>
    </div>
  </nav>

  <script src="config/supabase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/xp-system.js"></script>
  <script src="js/challenges.js"></script>
</body>
</html>
