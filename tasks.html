<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المهام - Task Intelligence System</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">TI</div>
        <div class="sidebar-brand">
          Task Intelligence
          <span>نظام إدارة المهام</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">القائمة</div>
          <a class="nav-item" href="index.html">
            <span class="nav-icon">📊</span> لوحة التحكم
          </a>
          <a class="nav-item active" href="tasks.html">
            <span class="nav-icon">📋</span> المهام
          </a>
          <a class="nav-item" href="analytics.html">
            <span class="nav-icon">📈</span> التحليلات
          </a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="nav-item" onclick="handleLogout()">
          <span class="nav-icon">🚪</span> تسجيل الخروج
        </div>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
          <h1 class="page-title">المهام</h1>
        </div>
        <div class="topbar-right">
          <span class="topbar-date" id="currentDate"></span>
          <div class="user-avatar" onclick="toggleUserDropdown()">
            <span id="avatarLetter">U</span>
            <div class="user-dropdown" id="userDropdown">
              <div class="user-dropdown-item" id="userEmail" style="color:var(--text-muted);cursor:default;"></div>
              <div class="user-dropdown-item danger" onclick="handleLogout()">🚪 تسجيل الخروج</div>
            </div>
          </div>
        </div>
      </header>

      <div class="page-content">
        <!-- Tabs -->
        <div class="tabs">
          <button class="tab active" onclick="switchTab('recurring', this)">المهام الثابتة</button>
          <button class="tab" onclick="switchTab('daily', this)">المهام اليومية</button>
        </div>

        <!-- Recurring Tasks Tab -->
        <div id="tabRecurring" class="tab-content active">
          <div class="flex-between mb-16">
            <h3>المهام الثابتة</h3>
            <button class="btn btn-primary" onclick="openRecurringModal()">+ إضافة مهمة</button>
          </div>
          <div id="recurringTasksList">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Daily Tasks Tab -->
        <div id="tabDaily" class="tab-content">
          <div class="flex-between mb-16">
            <h3>المهام اليومية</h3>
            <button class="btn btn-primary" onclick="openDailyModal()">+ إضافة مهمة</button>
          </div>
          <div id="dailyTasksList">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Recurring Task Modal -->
  <div class="modal-overlay" id="recurringModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="recurringModalTitle">إضافة مهمة ثابتة</h3>
        <button class="modal-close" onclick="closeModal('recurringModal')">&times;</button>
      </div>
      <form id="recurringForm" onsubmit="return saveRecurringTask(event)">
        <div class="modal-body">
          <input type="hidden" id="recurringEditId">
          <div class="form-group">
            <label class="form-label">عنوان المهمة</label>
            <input class="form-input" type="text" id="recurringTitle" placeholder="مثال: صلاة الفجر" required>
          </div>
          <div class="form-group">
            <label class="form-label">الوصف</label>
            <textarea class="form-textarea" id="recurringDesc" placeholder="وصف المهمة (اختياري)"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">الأولوية</label>
            <select class="form-select" id="recurringPriority">
              <option value="1">عالية</option>
              <option value="2" selected>متوسطة</option>
              <option value="3">منخفضة</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">أيام التكرار</label>
            <div class="day-checkboxes" id="recurringDays">
              <label class="day-checkbox">
                <input type="checkbox" name="day" value="sunday">
                <span class="day-label">ح</span>
              </label>
              <label class="day-checkbox">
                <input type="checkbox" name="day" value="monday">
                <span class="day-label">ن</span>
              </label>
              <label class="day-checkbox">
                <input type="checkbox" name="day" value="tuesday">
                <span class="day-label">ث</span>
              </label>
              <label class="day-checkbox">
                <input type="checkbox" name="day" value="wednesday">
                <span class="day-label">ر</span>
              </label>
              <label class="day-checkbox">
                <input type="checkbox" name="day" value="thursday">
                <span class="day-label">خ</span>
              </label>
              <label class="day-checkbox">
                <input type="checkbox" name="day" value="friday">
                <span class="day-label">ج</span>
              </label>
              <label class="day-checkbox">
                <input type="checkbox" name="day" value="saturday">
                <span class="day-label">س</span>
              </label>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">وقت التنفيذ (اختياري)</label>
            <input class="form-input" type="time" id="recurringTime">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal('recurringModal')">إلغاء</button>
          <button type="submit" class="btn btn-primary" id="recurringSaveBtn">حفظ المهمة</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Daily Task Modal -->
  <div class="modal-overlay" id="dailyModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="dailyModalTitle">إضافة مهمة يومية</h3>
        <button class="modal-close" onclick="closeModal('dailyModal')">&times;</button>
      </div>
      <form id="dailyForm" onsubmit="return saveDailyTask(event)">
        <div class="modal-body">
          <input type="hidden" id="dailyEditId">
          <div class="form-group">
            <label class="form-label">عنوان المهمة</label>
            <input class="form-input" type="text" id="dailyTitle" placeholder="مثال: قراءة فصل من كتاب" required>
          </div>
          <div class="form-group">
            <label class="form-label">الوصف</label>
            <textarea class="form-textarea" id="dailyDesc" placeholder="وصف المهمة (اختياري)"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">التصنيف</label>
            <select class="form-select" id="dailyCategory">
              <option value="دراسة">📚 دراسة</option>
              <option value="عمل">💼 عمل</option>
              <option value="صحة">🏃 صحة</option>
              <option value="تطوير ذاتي">🌱 تطوير ذاتي</option>
              <option value="شخصي">🧑 شخصي</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">الأولوية</label>
            <select class="form-select" id="dailyPriority">
              <option value="1">عالية</option>
              <option value="2" selected>متوسطة</option>
              <option value="3">منخفضة</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">الوقت المتوقع (دقائق)</label>
            <input class="form-input" type="number" id="dailyTime" value="30" min="5" max="480" required>
          </div>
          <div class="form-group">
            <label class="form-label">تاريخ الاستحقاق</label>
            <input class="form-input" type="date" id="dailyDate">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal('dailyModal')">إلغاء</button>
          <button type="submit" class="btn btn-primary" id="dailySaveBtn">حفظ المهمة</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="supabase.js"></script>
  <script src="app.js"></script>
  <script src="tasks.js"></script>
</body>
</html>
