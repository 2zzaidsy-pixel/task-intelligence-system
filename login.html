<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - Task Intelligence System</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-header">
        <div class="login-logo">TI</div>
        <h1 class="login-title">Task Intelligence</h1>
        <p class="login-subtitle">نظام إدارة المهام وتحليل الإنتاجية</p>
      </div>

      <div class="login-card">
        <!-- Login Form -->
        <div id="loginForm" class="auth-form">
          <h3 style="margin-bottom:20px;">تسجيل الدخول</h3>
          <div id="loginError" class="auth-error"></div>
          <div id="loginSuccess" class="auth-success"></div>
          <form id="loginFormElement" onsubmit="return handleLogin(event)">
            <div class="form-group">
              <label class="form-label">البريد الإلكتروني</label>
              <input class="form-input" type="email" id="loginEmail" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
              <label class="form-label">كلمة المرور</label>
              <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
              <span id="loginBtnText">تسجيل الدخول</span>
              <div class="spinner spinner-sm" id="loginSpinner" style="display:none;"></div>
            </button>
          </form>
          <div class="login-footer" style="margin-top:16px;">
            <a onclick="showForm('register')">ليس لديك حساب؟ سجل الآن</a>
            <span style="margin:0 8px;color:var(--border-color);">|</span>
            <a onclick="showForm('forgot')">نسيت كلمة المرور؟</a>
          </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="auth-form" style="display:none;">
          <h3 style="margin-bottom:20px;">إنشاء حساب جديد</h3>
          <div id="registerError" class="auth-error"></div>
          <div id="registerSuccess" class="auth-success"></div>
          <form id="registerFormElement" onsubmit="return handleRegister(event)">
            <div class="form-group">
              <label class="form-label">البريد الإلكتروني</label>
              <input class="form-input" type="email" id="registerEmail" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
              <label class="form-label">كلمة المرور</label>
              <input class="form-input" type="password" id="registerPassword" placeholder="••••••••" minlength="6" required>
              <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;">يجب أن تكون 6 أحرف على الأقل</div>
            </div>
            <div class="form-group">
              <label class="form-label">تأكيد كلمة المرور</label>
              <input class="form-input" type="password" id="registerConfirm" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="registerBtn">
              <span id="registerBtnText">إنشاء الحساب</span>
              <div class="spinner spinner-sm" id="registerSpinner" style="display:none;"></div>
            </button>
          </form>
          <div class="login-footer" style="margin-top:16px;">
            <a onclick="showForm('login')">لديك حساب بالفعل؟ تسجيل الدخول</a>
          </div>
        </div>

        <!-- Forgot Password Form -->
        <div id="forgotForm" class="auth-form" style="display:none;">
          <h3 style="margin-bottom:20px;">استعادة كلمة المرور</h3>
          <div id="forgotError" class="auth-error"></div>
          <div id="forgotSuccess" class="auth-success"></div>
          <p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:16px;">
            أدخل بريدك الإلكتروني وسنرسل لك رابط استعادة كلمة المرور.
          </p>
          <form id="forgotFormElement" onsubmit="return handleForgotPassword(event)">
            <div class="form-group">
              <label class="form-label">البريد الإلكتروني</label>
              <input class="form-input" type="email" id="forgotEmail" placeholder="example@email.com" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="forgotBtn">
              <span id="forgotBtnText">إرسال رابط الاستعادة</span>
              <div class="spinner spinner-sm" id="forgotSpinner" style="display:none;"></div>
            </button>
          </form>
          <div class="login-footer" style="margin-top:16px;">
            <a onclick="showForm('login')">العودة إلى تسجيل الدخول</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="config/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
